<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – Cloud Test Platform</title>
    <meta name="description" content="Reset your Cloud Test Platform password via OTP." />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<div class="page-center">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon">🔑</div>
            <h1>Reset Password</h1>
            <p>{{ "Verify your OTP" if step == '2' else "We'll send you a one-time code" }}</p>
        </div>

        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step-dot active"></div>
            <div class="step-dot {{ 'active' if step == '2' else '' }}"></div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-msg
            {% if 'OTP' in messages[0] or 'sent' in messages[0] or 'DEV' in messages[0] %}info
            {% elif 'successful' in messages[0] %}success
            {% else %}error{% endif %}">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <!-- STEP 1: Enter Email -->
        {% if step == '1' %}
        <form method="POST" action="/forgot">
            <input type="hidden" name="action" value="send_otp" />
            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:8px;">
                📨 Send OTP
            </button>
        </form>
        {% endif %}

        <!-- STEP 2: Enter OTP + New Password -->
        {% if step == '2' %}
        <form method="POST" action="/forgot">
            <input type="hidden" name="action" value="reset_password" />
            <input type="hidden" name="email" value="{{ email }}" />

            <div class="form-group">
                <label>Account Email</label>
                <input type="text" value="{{ email }}" disabled
                    style="opacity:0.6; cursor:not-allowed;" />
            </div>

            <div class="form-group">
                <label for="otp">One-Time Password (OTP)</label>
                <input type="text" id="otp" name="otp" placeholder="6-digit OTP"
                    maxlength="6" pattern="\d{6}" required autocomplete="one-time-code" />
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password"
                    placeholder="Min. 6 characters" required minlength="6" />
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:8px;">
                🔒 Reset Password
            </button>
        </form>

        <div style="text-align:center; margin-top:16px;">
            <a href="/forgot" style="font-size:0.85rem; color: var(--text-muted);">
                ← Resend OTP
            </a>
        </div>
        {% endif %}

        <div class="auth-links" style="margin-top:20px;">
            <a href="/">← Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
