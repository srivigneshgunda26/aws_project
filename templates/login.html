<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – Cloud Test Platform</title>
    <meta name="description" content="Login to Cloud Test Platform to take tests and view results." />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<div class="page-center">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="logo-icon">☁️</div>
            <h1>Cloud Test Platform</h1>
            <p>Sign in to your account</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-msg {% if 'successful' in messages[0] or 'success' in messages[0] %}success{% else %}error{% endif %}">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 8px;">
                🔐 Sign In
            </button>
        </form>

        <div class="auth-links">
            <p><a href="/forgot">Forgot your password?</a></p>
            <p style="margin-top: 10px;">Don't have an account? <a href="/register"><strong>Create one</strong></a></p>
            <p style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--glass-border); font-size: 0.78rem; color: var(--text-muted);">
                Admin? <a href="/setup" style="color: #fbbf24;">⚙️ Admin Setup</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
