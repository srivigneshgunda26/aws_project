<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error – Cloud Test Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<div class="page-center">
    <div class="auth-card" style="max-width:500px; text-align:center;">
        <div class="logo-icon" style="font-size:2.5rem; margin-bottom:16px;">⚠️</div>
        <h1 style="font-size:1.4rem; margin-bottom:12px;">Something went wrong</h1>

        <div style="background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3);
                    border-radius:10px; padding:16px; margin:20px 0; text-align:left;
                    font-size:0.85rem; color:#ff6b6b; word-break:break-word;">
            {{ error }}
        </div>

        <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:24px;">
            This is usually caused by missing or invalid AWS credentials in your <code>.env</code> file.
            Make sure <code>AWS_REGION</code>, <code>AWS_ACCESS_KEY</code>, and <code>AWS_SECRET_KEY</code> are set correctly.
        </p>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
            <a href="/" class="btn btn-primary" style="width:auto; padding:10px 24px;">🏠 Go Home</a>
            <a href="javascript:history.back()" class="btn btn-outline" style="padding:10px 24px;">← Go Back</a>
        </div>
    </div>
</div>
</body>
</html>
